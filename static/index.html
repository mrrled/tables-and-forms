<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Форма выбора питомца</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<main>
    <h1>Найди себе друга!</h1>
    <form class="form" action="/pets/orders" method="POST">
        <label>Тип питомца:
        <select name="petType" required>
            <option value="">Выберите...</option>
            <option value="cat">Кот</option>
            <option value="dog">Собака</option>
            <option value="bird">Птица</option>
        </select>
        </label>

        <label>Пол:
            <input type="radio" name="gender" value="boy" required> господин
            <input type="radio" name="gender" value="girl" required> госпожа
            <input type="radio" name="gender" value="none" required> другое
        </label>

        <label>Цвет глаз:
            <input type="color" name="eyeColor" required>
        </label>

        <label>Длина хвоста (см):
            <input type="number" name="tailLength">
        </label>

        <label>Имя хозяина:
            <input type="text" name="name" required minlength="3" maxlength="50">
        </label>

        <label>Дата рождения:
            <input type="date" name="dateOfBirth" required>
        </label>

        <label>Email:
            <input type="email" name="email" required>
        </label>

        <label>Телефон:
            <input type="tel" name="phone" required>
        </label>

        <label>
            <input type="checkbox" name="rules" value="true" required>
            Я согласен с правилами
        </label>

        <button type="submit">Завести питомца</button>
        <input type="reset" value="Сбросить">
    </form>

</main>
</body>
</html>
